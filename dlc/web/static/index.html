<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Digital Lab Coach</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  </head>
  <body>
    <header>
      <h1>Digital Lab Coach</h1>
      <div class="toolbar">
        <label for="file-input" class="btn">Add .dig</label>
        <input id="file-input" type="file" accept=".dig" multiple />
        <select id="file-select" class="select" disabled>
          <option>(no file)</option>
        </select>
        <button id="prev-btn" class="btn-ghost" disabled>Previous</button>
        <button id="next-btn" class="btn-ghost" disabled>Next</button>
        <button id="clear-btn" class="btn-ghost" disabled>Clear all</button>
      </div>
    </header>

    <main>
      <section id="graph-pane">
        <div id="cy"></div>
        <div id="placeholder" class="placeholder">
          No circuit loaded. Add a <code>.dig</code> file from the toolbar
          above &mdash; multiple files (parent + subcircuits) supported.
        </div>
        <div id="hover-popup" class="hover-popup hidden">
          <div class="hover-popup-title" id="hover-popup-title">&nbsp;</div>
          <div class="hover-popup-body" id="hover-popup-body"></div>
        </div>
      </section>

      <aside id="summary-pane">
        <h2>Circuit summary</h2>
        <div id="summary" class="muted">No file loaded.</div>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
